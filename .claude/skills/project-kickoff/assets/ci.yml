name: CI

# Harness v3.1 — Feedback Hardened
#
# CI por níveis (N1 / N2 / N3). Cada projeto mapeia seus scripts reais.
# Regra: a classe de risco da feature (A / B / C / D — ver AGENTS.md §2)
# determina o nível mínimo de CI que PRECISA estar verde antes do merge.
#
#   N1 — lint + typecheck + unit (+ build se rápido)         → obrigatório para A, B
#   N2 — N1 + integration + contract + db validation + build → obrigatório para B relevante, C
#   N3 — N2 + e2e + smoke + migration validation              → obrigatório para C crítica, D
#
# Em um repo pequeno, rodar N1 em todo push e N2/N3 em PRs e em main cobre bem.
# Em projetos maiores, separe em jobs e use "required checks" para bloquear merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────
  # N1 — Sempre roda. Bloqueia merge para qualquer feature A/B/C/D.
  # ───────────────────────────────────────────────────────────────
  n1-basic:
    name: N1 — Lint + Typecheck + Unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test -- --run

  # ───────────────────────────────────────────────────────────────
  # N2 — Roda em PR e em push para main. Obrigatório para B/C.
  # Descomente e ajuste quando o projeto tiver integration/contract/db.
  # ───────────────────────────────────────────────────────────────
  # n2-integration:
  #   name: N2 — Integration + Contract + Build
  #   needs: n1-basic
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 20
