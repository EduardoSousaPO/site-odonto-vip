  #     postgres:
  #       image: postgres:16
  #       env:
  #         POSTGRES_PASSWORD: postgres
  #       ports: ["5432:5432"]
  #       options: >-
  #         --health-cmd pg_isready
  #         --health-interval 10s
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #         cache: "npm"
  #     - run: npm ci
  #     - name: Integration tests
  #       run: npm run test:integration
  #     - name: Contract tests
  #       run: npm run test:contract
  #     - name: Build
  #       run: npm run build

  # ───────────────────────────────────────────────────────────────
  # N3 — Só em PR para main, ou manual. Obrigatório para C crítica/D.
  # Descomente quando houver e2e e smoke tests rodáveis em CI.
  # ───────────────────────────────────────────────────────────────
