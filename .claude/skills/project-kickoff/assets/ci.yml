# ───────────────────────────────────────────────────────────────
# Notas
# ───────────────────────────────────────────────────────────────
# - Scripts referenciados acima são os nomes sugeridos. Mapeie em package.json:
#     "lint": "eslint .",
#     "typecheck": "tsc --noEmit",
#     "test": "vitest run",
#     "test:integration": "vitest run --config vitest.integration.ts",
#     "test:contract": "vitest run --config vitest.contract.ts",
#     "test:e2e": "playwright test",
#     "build": "next build",
#     "migrate:check": "your migration dry-run command",
#     "smoke": "node scripts/smoke.mjs"
#
# - Para classes D (produção/infra), valide também:
#     - Rollback plan documentado no Feature Contract.
#     - Staging validado antes do deploy em produção.
#     - Feature flag se altera contrato público.
